<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Kesehatan Anak</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-100 to-blue-300 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-96 text-center">
    
    <h1 class="text-2xl font-bold mb-4 text-blue-600">
      🧠 AI Kesehatan Anak
    </h1>

    <p class="text-gray-500 mb-6">
      Masukkan data anak untuk mengetahui status kesehatan
    </p>

    <input id="umur" type="number" placeholder="Umur"
      class="w-full p-2 mb-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

    <input id="berat" type="number" placeholder="Berat (kg)"
      class="w-full p-2 mb-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

    <input id="tinggi" type="number" placeholder="Tinggi (cm)"
      class="w-full p-2 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

    <button onclick="predict()"
      class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg w-full">
      🔍 Prediksi
    </button>

    <div id="hasil" class="mt-6 text-lg font-semibold"></div>

  </div>

<script>
function predict() {
  const umur = document.getElementById("umur").value;
  const berat = document.getElementById("berat").value;
  const tinggi = document.getElementById("tinggi").value;

  if (!umur || !berat || !tinggi) {
    document.getElementById("hasil").innerHTML =
      "<span class='text-yellow-500'>⚠️ Isi semua data dulu!</span>";
    return;
  }

  const data = {
    umur: parseInt(umur),
    berat: parseInt(berat),
    tinggi: parseInt(tinggi)
  };

  fetch("http://127.0.0.1:5000/predict", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(data => {
  let warna = "text-green-600";

  if (data.status === "Tidak Sehat") warna = "text-yellow-600";
  if (data.status === "Sehat") warna = "text-red-600";

  document.getElementById("hasil").innerHTML =
    `<span class='${warna}'>Status: ${data.status}</span><br>
     IMT: ${data.imt}`;
});

}
</script>

</body>
</html>
